<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Jarvis — Command Center (GitHub)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root{--bg:#f6f7f9;--card:#fff;--ink:#15171c;--muted:#6b7280;--line:#e6e8ec;--accent:#4f46e5;--green:#16a34a;--amber:#d97706;--red:#dc2626;--blue:#2563eb;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.wrap{max-width:1160px;margin:0 auto;padding:22px}
h1{font-size:21px;margin:0 0 2px}.sub{color:var(--muted);font-size:12px;margin-bottom:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.card h2{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:0 0 10px}
.kpi{display:flex;gap:22px;flex-wrap:wrap}.kpi .n{font-size:26px;font-weight:700}.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase}
.section{margin-top:16px}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:720px){.two{grid-template-columns:1fr}}
.cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.nm{font-weight:600;font-size:15px}.co{color:var(--muted);font-size:12px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.b{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:#fafbfc;color:var(--muted)}
.b.cnt{background:#eef0fe;color:var(--accent);border-color:#d8dcfb}
.b.op{background:#f3eafe;color:#7c3aed;border-color:#e4d4fb}
.b.so{background:#eaf6ff;color:#0369a1;border-color:#cce8fb}
.row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);gap:10px}
.row:last-child{border-bottom:none}.ti{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mt{color:var(--muted);font-size:12px}.note{font-size:12px;color:var(--muted)}
.warn{background:#fff8e6;border:1px solid #f3e0a8;color:#8a6d1a;padding:8px 10px;border-radius:8px;font-size:12px;margin-bottom:12px}
.ok{background:#eef9f1;border:1px solid #cdeed5;color:#1b6b35}
canvas{max-height:220px}
/* task board */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
@media(max-width:900px){.board{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.board{grid-template-columns:1fr}}
.colhead{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;margin-bottom:8px}
.dot{width:9px;height:9px;border-radius:50%}
.dot.needs{background:var(--amber)}.dot.prog{background:var(--blue)}.dot.blocked{background:var(--red)}.dot.done{background:var(--green)}
.cnt2{font-size:11px;color:var(--muted);font-weight:400}
.task{border:1px solid var(--line);border-radius:9px;padding:9px 10px;margin-bottom:8px;background:#fcfcfd}
.task .tt{font-size:13px;font-weight:500;margin-bottom:5px}
.task .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;padding:1px 7px;border-radius:999px;background:#eef0fe;color:var(--accent)}
.who{font-size:10px;padding:1px 7px;border-radius:999px}
.who.ai{background:#eef0fe;color:var(--accent)}.who.temo{background:#fff5e6;color:var(--amber)}
.pri{font-size:10px;color:var(--muted)}
.tnote{font-size:11px;color:var(--muted);margin-top:5px}
.done .task .tt{text-decoration:line-through;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Jarvis — Command Center</h1>
  <div class="sub" id="sub">Loading…</div>
  <div class="warn" id="tok"></div>
  <div class="card kpi" id="kpis"></div>

  <div class="section"><div class="card">
    <h2>Task board — across all projects</h2>
    <div class="board" id="board"></div>
  </div></div>

  <div class="section"><div class="card"><h2>Projects</h2><div class="cols" id="projects"></div></div></div>
  <div class="section two">
    <div class="card"><h2>Model mix (cost proxy)</h2><canvas id="modelChart"></canvas></div>
    <div class="card"><h2>Sessions by project</h2><canvas id="projChart"></canvas></div>
  </div>
  <div class="section"><div class="card"><h2>Recent sessions</h2><div id="sessions"></div></div></div>
</div>
<script>
const fmt = n => n>=1000 ? (n/1000).toFixed(1)+'k' : n;
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function modelBadge(m){const s=(m||'').toLowerCase();const cls=s.includes('opus')?'op':s.includes('sonnet')?'so':'';const short=s.replace('claude-','').replace(/\[.*$/,'');return `<span class="b ${cls}">${esc(short)}</span>`;}

// ---- Task board ----
const STATUSES=[
  {key:'needs_me',label:'Needs me',dot:'needs'},
  {key:'in_progress',label:'AI in progress',dot:'prog'},
  {key:'blocked',label:'Blocked',dot:'blocked'},
  {key:'done',label:'Done',dot:'done'},
];
function renderTasks(tasks){
  const board=document.getElementById('board'); board.innerHTML='';
  STATUSES.forEach(st=>{
    const items=tasks.filter(t=>t.status===st.key);
    const col=document.createElement('div'); col.className=st.key==='done'?'done':'';
    col.innerHTML=`<div class="colhead"><span class="dot ${st.dot}"></span>${st.label} <span class="cnt2">${items.length}</span></div>`;
    items.forEach(t=>{
      const d=document.createElement('div'); d.className='task';
      d.innerHTML=`<div class="tt">${esc(t.title)}</div>
        <div class="meta"><span class="tag">${esc(t.project)}</span>
        <span class="who ${t.owner}">${t.owner==='ai'?'AI':'you'}</span>
        ${t.priority?`<span class="pri">${esc(t.priority)}</span>`:''}</div>
        ${t.note?`<div class="tnote">${esc(t.note)}</div>`:''}`;
      col.appendChild(d);
    });
    if(!items.length) col.innerHTML+=`<div class="note">—</div>`;
    board.appendChild(col);
  });
  return tasks.filter(t=>t.status==='needs_me').length;
}

Promise.all([
  fetch('./data.json?_='+Date.now()).then(r=>r.json()).catch(()=>null),
  fetch('./tasks.json?_='+Date.now()).then(r=>r.json()).catch(()=>null),
]).then(([d,tk])=>{
  // task board first (the spine)
  const needCount = tk && tk.tasks ? renderTasks(tk.tasks) : 0;

  if(!d){ document.getElementById('sub').textContent='Task board loaded. Session data (data.json) pending first collector run.';
    document.getElementById('tok').style.display='none'; return; }

  document.getElementById('sub').textContent =
    `${d.sessionCount} sessions · ${Object.keys(d.byModel).length} models · ${needCount} need you · updated ${new Date(d.generatedAt).toLocaleString()}`;
  const tok=document.getElementById('tok');
  tok.className='warn'+(d.tokensAvailable?' ok':''); tok.textContent=(d.tokensAvailable?'✓ ':'ⓘ ')+d.tokensNote;

  document.getElementById('kpis').innerHTML =
    `<div><div class="n">${needCount}</div><div class="l">Need you</div></div>`+
    `<div><div class="n">${d.sessionCount}</div><div class="l">Sessions</div></div>`+
    `<div><div class="n">${d.projects.filter(p=>!['personal','other'].includes(p.id)).length}</div><div class="l">Projects</div></div>`+
    Object.entries(d.byModel).map(([m,c])=>`<div><div class="n">${c}</div><div class="l">${esc(m.replace('claude-','').replace(/\[.*$/,''))}</div></div>`).join('');

  document.getElementById('projects').innerHTML = d.projects.map(p=>{
    const models=Object.entries(p.models).map(([m,c])=>`${modelBadge(m)}<span class="note"> ×${c}</span>`).join(' ');
    const la=p.lastActivity?new Date(p.lastActivity).toLocaleDateString():'—';
    const tk2=p.tokens?`<span class="b cnt">${fmt(p.tokens.input+p.tokens.output)} tok</span>`:'';
    return `<div class="card" style="padding:12px"><div class="nm">${esc(p.name)}</div><div class="co">${esc(p.company)}</div>
      <div class="badges"><span class="b cnt">${p.sessions} session${p.sessions!=1?'s':''}</span>${tk2}</div>
      <div class="badges">${models}</div><div class="note" style="margin-top:6px">last: ${la}</div></div>`;
  }).join('');

  new Chart(document.getElementById('modelChart'),{type:'doughnut',
    data:{labels:Object.keys(d.byModel).map(m=>m.replace('claude-','').replace(/\[.*$/,'')),
      datasets:[{data:Object.values(d.byModel),backgroundColor:['#7c3aed','#0369a1','#16a34a','#d97706','#dc2626','#6b7280']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});

  const pr=d.projects.filter(p=>!['personal','other'].includes(p.id));
  new Chart(document.getElementById('projChart'),{type:'bar',
    data:{labels:pr.map(p=>p.name),datasets:[{data:pr.map(p=>p.sessions),backgroundColor:'#4f46e5'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});

  document.getElementById('sessions').innerHTML = d.sessions.slice(0,15).map(s=>
    `<div class="row"><div style="flex:1;min-width:0"><div class="ti">${esc(s.title)}</div>
     <div class="mt">${esc(s.projectName)} · ${s.lastActivityAt?new Date(s.lastActivityAt).toLocaleDateString():'—'}</div></div>
     ${modelBadge(s.model)}</div>`).join('');
});
</script>
</body>
</html>
